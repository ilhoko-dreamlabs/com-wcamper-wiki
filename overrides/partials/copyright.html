{# Custom footer copyright partial #}
<div class="md-copyright">
  <div class="md-copyright__highlight">
    {% if config.copyright %}
      <div class="wc-copyright">{{ config.copyright }}</div>
    {% endif %}

    <div class="wc-powered-by">
      <span class="wc-powered-by__text">powered by</span>
      <img class="wc-powered-by__logo"
           src="https://web.dreamlabs.co.kr/assets/img/camprogrammer-logo.png"
           alt="캠핑하는 프로그래머"
           loading="lazy" />
    </div>
  </div>

  {% if not config.extra.generator == false %}
    <div class="md-copyright__highlight">
      Made with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank" rel="noopener">Material for MkDocs</a>
    </div>
  {% endif %}
</div>
